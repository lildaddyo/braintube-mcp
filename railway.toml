[build]
builder = "dockerfile"

[deploy]
startCommand = "node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "braintube-mcp"

[[services]]
name = "rnd-daily-cron"
# cronSchedule DISABLED — enable on Spuck's explicit go after Phase C review
# cronSchedule = "0 3 * * *"
startCommand = "node dist/cron/rnd-daily.js"
